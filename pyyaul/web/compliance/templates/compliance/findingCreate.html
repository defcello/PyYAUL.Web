{% extends "base.html" %}
{% block content %}
    <div class="container py-4" style="max-width: 900px;">
        <div class="text-start mb-4">
            <h1 class="mb-1">New Finding</h1>
            <p class="text-muted mb-0">Review: {{ review.title }}</p>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label" for="severity">Severity</label>
                            <select class="form-select" id="severity" name="severity" required>
                                {% for severity in finding_severities %}
                                    <option value="{{ severity }}">{{ severity }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label" for="title">Title</label>
                            <input class="form-control" id="title" name="title" required type="text" />
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="description">Description</label>
                            <textarea class="form-control" id="description" name="description" required rows="6"></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a class="btn btn-outline-secondary" href="{{ url_for('compliance.page_reviewDetail', review_id=review.id) }}">Cancel</a>
                        <button class="btn btn-primary" type="submit">Add Finding</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
