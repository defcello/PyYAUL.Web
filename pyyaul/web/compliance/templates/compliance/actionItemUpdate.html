{% extends "base.html" %}
{% block content %}
    <div class="container py-4" style="max-width: 900px;">
        <div class="text-start mb-4">
            <h1 class="mb-1">Add Action Item Update</h1>
            <p class="text-muted mb-0">{{ action_item.title }}</p>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label" for="update_type">Update Type</label>
                            <select class="form-select" id="update_type" name="update_type" required>
                                {% for update_type in action_item_update_types %}
                                    <option value="{{ update_type }}">{{ update_type }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="notes">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" required rows="6"></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a class="btn btn-outline-secondary" href="{{ url_for('compliance.page_actionItemDetail', action_item_id=action_item.id) }}">Cancel</a>
                        <button class="btn btn-primary" type="submit">Save Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
